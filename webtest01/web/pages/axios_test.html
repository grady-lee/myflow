<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
    <div id="app">
        <input type="button" @click="getData" value="getData">
        <div>{{message}}</div>
    </div>
<script>
    var app = new Vue({
        el: '#app',
        data: {
            message: ""
        },
        methods: {
            getData: function () {
                axios({
                    method: 'get',
                    url: '/webtest01/test',
                    params: {
                        name: 'test',
                        value: 'test1'
                    }
                }).then(res => {
                    this.message = res.data;
                }).catch(err => {
                    console.log(err);
                })
            }
        }
    });
</script>
</body>
</html>
